<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Koodarin Ristikko</title>
    <style>
        /* Perusasetukset */
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f9f9f9; }
        
        /* Ristikon tyylit - TÄMÄ tekee ruudukon */
        table { border-collapse: collapse; background: white; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        
        td { 
            width: 60px; 
            height: 60px; 
            border: 2px solid #333; /* Näkyvät mustat reunat */
            padding: 0; 
            position: relative; 
            text-align: center;
        }

        /* Tyhjä/Musta ruutu */
        .black { background-color: #333; }

        /* Vihjeruutu */
        .clue { background-color: #eee; font-size: 11px; font-weight: bold; padding: 2px; line-height: 1; color: #d32f2f; }

        /* Kirjoituskenttä */
        input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 28px; font-weight: bold; text-transform: uppercase;
            outline: none; background: transparent;
        }

        /* Aktiivisen ruudun korostus */
        input:focus { background-color: #fff9c4; }
    </style>
</head>
<body>

    <h2>Oma Ristikko v1.0</h2>

    <table>
        <tr>
            <td class="clue">PYHÄ<br>➔</td>
            <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td class="black"></td>
        </tr>
        <tr>
            <td class="clue">PULP<br>⬇</td>
            <td class="black"></td>
            <td class="black"></td>
            <td class="clue">PITT<br>➔</td>
            <td><input maxlength="1"></td> <td><input maxlength="1"></td> </tr>
        <tr>
            <td><input maxlength="1"></td> <td class="clue">ASUTUS<br>➔</td>
            <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> </tr>
    </table>

    <script>
        // Logiikka kursorin automaattiseen siirtoon
        const inputs = document.querySelectorAll('input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Jos kirjoitetaan merkki, hypätään seuraavaan input-kenttään
                if (e.target.value.length === 1) {
                    const next = inputs[index + 1];
                    if (next) next.focus();
                }
            });

            // Backspace siirtää takaisin päin
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '') {
                    const prev = inputs[index - 1];
                    if (prev) prev.focus();
                }
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <style>
        /* Perusulkoasu */
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        
        /* Ristikon ruudukko */
        table { border-collapse: collapse; background: white; }
        td { width: 50px; height: 50px; border: 1px solid #000; text-align: center; vertical-align: middle; padding: 0; position: relative; }
        
        /* Vihjeruutu (harmaa) */
        .vihje { background: #ddd; font-size: 10px; font-weight: bold; line-height: 1; padding: 2px; }
        
        /* Kirjoitusruutu */
        input { width: 100%; height: 100%; border: none; text-align: center; font-size: 24px; font-weight: bold; text-transform: uppercase; outline: none; }
        input:focus { background: #fff9c4; }
        
        /* Numerointi kulmassa */
        .nro { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #666; }
    </style>
</head>
<body>

    <h2>Yksinkertainen Eläinristikko</h2>

    <table>
        <tr>
            <td class="vihje">NOPEIN<br>MAALLA<br>⬇</td>
            <td><input maxlength="1" id="c1"></td> <td class="vihje">ALKAA<br>NUIJA-<br>PÄÄNÄ ⬇</td>
            <td><input maxlength="1" id="f1"></td> <td class="vihje">RAIDAT<br>VAAKAAN<br>➔</td>
            <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> </tr>
        <tr>
            <td class="vihje">PARAS<br>YSTÄVÄ<br>➔</td>
            <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td><input maxlength="1"></td> <td colspan="6" style="border:none"></td> </tr>
    </table>

    <p><i>Tämä on rakennettu suoraan taulukkoon (table). Se on helpoin tapa hallita ristikkoa.</i></p>

    <script>
        // Automaattinen siirtyminen seuraavaan ruutuun
        const inputs = document.querySelectorAll('input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>90's Rock & Movie Crossword</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; }
        h2 { color: #f44336; text-transform: uppercase; letter-spacing: 2px; }
        
        #grid { 
            display: grid; 
            grid-template-columns: repeat(6, 100px); 
            grid-template-rows: repeat(6, 100px);
            background: #000; gap: 2px; border: 4px solid #000;
        }

        /* Vihjeruutu (Kuten sanomalehdessä) */
        .clue { 
            background: #333; color: #fff; font-size: 12px; padding: 5px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border: 1px solid #444; line-height: 1.2;
            position: relative;
        }
        .arrow-r::after { content: '➔'; position: absolute; right: 2px; bottom: 2px; color: #f44336; font-size: 18px; }
        .arrow-d::after { content: '⬇'; position: absolute; right: 2px; bottom: 2px; color: #f44336; font-size: 18px; }

        /* Vastausruutu */
        .cell { background: white; position: relative; }
        .cell input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 40px; font-weight: bold; text-transform: uppercase; outline: none;
            background: transparent; color: #000;
        }
        .cell input:focus { background: #ffeb3b; }
        
        /* YouTube Info */
        #player-info { margin-top: 20px; color: #ffeb3b; font-weight: bold; display: none; }
    </style>
</head>
<body>

<h2>90's Heavy & Movie Ristikko</h2>

<div id="grid">
    <div class="clue arrow-r">DION<br>HITTI</div>
    <div class="cell"><input maxlength="1" data-ans="H"></div>
    <div class="cell"><input maxlength="1" data-ans="O"></div>
    <div class="cell"><input maxlength="1" data-ans="L"></div>
    <div class="cell"><input maxlength="1" data-ans="Y"></div>
    <div class="clue arrow-d">MUSTA<br>ALBUMI</div>

    <div class="clue arrow-d">ARSKAN<br>LEFFA</div>
    <div class="cell"><input maxlength="1" data-ans="M"></div>
    <div class="cell"><input maxlength="1" data-ans="A"></div>
    <div class="cell"><input maxlength="1" data-ans="T"></div>
    <div class="cell"><input maxlength="1" data-ans="R"></div>
    <div class="cell"><input maxlength="1" data-ans="M"></div>

    <div class="cell"><input maxlength="1" data-ans="T"></div>
    <div class="cell"><input maxlength="1" data-ans="E"></div>
    <div class="cell"><input maxlength="1" data-ans="R"></div>
    <div class="cell"><input maxlength="1" data-ans="M"></div>
    <div class="cell"><input maxlength="1" data-ans="I"></div>
    <div class="cell"><input maxlength="1" data-ans="E"></div>

    <div class="clue arrow-r">SEATTLE<br>GRUNGE</div>
    <div class="cell"><input maxlength="1" data-ans="N"></div>
    <div class="cell"><input maxlength="1" data-ans="I"></div>
    <div class="cell"><input maxlength="1" data-ans="R"></div>
    <div class="cell"><input maxlength="1" data-ans="V"></div>
    <div class="cell"><input maxlength="1" data-ans="A"></div>
</div>

<div id="player-info">NYT SOI: <span id="track"></span></div>
<div id="yt-player" style="display:none"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', { height: '0', width: '0' });
    }

    const songs = {
        "HOLY": { id: "2lvs2FzF238", start: 45, name: "Dio - Holy Diver" },
        "METALLICA": { id: "CD-E-LDc384", start: 72, name: "Metallica - Enter Sandman" },
        "NIRVANA": { id: "hTWKbfoikeg", start: 0, name: "Nirvana - Smells Like Teen Spirit" }
    };

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
            if(input.value.toUpperCase() === input.dataset.ans) {
                input.style.color = "#2e7d32";
                checkWin();
            }
        });
    });

    function checkWin() {
        // Tähän voidaan lisätä musiikin käynnistys kun sana on valmis
        // Esimerkkinä Holy:
        const holy = Array.from(document.querySelectorAll('input')).slice(0,4).map(i => i.value).join("");
        if(holy === "HOLY") playMusic("HOLY");
    }

    function playMusic(key) {
        if(player && songs[key]) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            player.loadVideoById({ videoId: songs[key].id, startSeconds: songs[key].start });
            document.getElementById('player-info').style.display = 'block';
            document.getElementById('track').innerText = songs[key].name;
        }
    }
</script>
</body>
</html>

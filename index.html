<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90's Rock & Movie Crossword</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #f44336; --bg: #121212; --cell: #222; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Käyttöliittymä */
        #ui-layer { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.85); padding: 15px; border-left: 5px solid var(--accent); border-radius: 4px; }
        
        #now-playing { 
            position: fixed; top: 15px; right: 15px; z-index: 100; 
            background: #282828; padding: 15px; border-radius: 8px; 
            display: none; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 250px;
        }
        #now-playing a { color: #ffeb3b; text-decoration: none; font-weight: bold; font-size: 0.9em; display: block; margin-top: 5px; }
        
        #clue-box { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); padding: 20px; border-radius: 50px;
            font-size: 1.3em; font-weight: bold; min-width: 320px; text-align: center;
            box-shadow: 0 5px 20px rgba(244,67,54,0.4); z-index: 100;
        }

        /* Ristikkoalue */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #grid { display: grid; background: #000; gap: 1px; transform-origin: center; }
        
        .cell { width: 50px; height: 50px; background: var(--cell); position: relative; }
        .cell.active { background: #fff; }
        .cell input { 
            width: 100%; height: 100%; border: none; text-align: center; 
            font-size: 24px; font-weight: bold; background: transparent; outline: none; text-transform: uppercase;
        }
        .cell.correct input { color: #2e7d32; }
        .num { position: absolute; top: 2px; left: 2px; font-size: 11px; color: #999; }
        
        /* YouTube piilossa */
        #yt-player { position: absolute; top: -1000px; left: -1000px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="streak">STRIikki: 0 PÄIVÄÄ 🔥</div>
    <div id="timer">TÄNÄÄN: 00:00 / 05:00</div>
</div>

<div id="now-playing">
    <div style="font-size: 0.7em; color: #aaa; text-transform: uppercase;">Nyt soi:</div>
    <div id="track-info" style="font-weight: bold; margin: 5px 0;"></div>
    <a id="yt-link" href="#" target="_blank">Kuuntele koko biisi ➔</a>
</div>

<div id="clue-box">Klikkaa valkoista ruutua...</div>

<div id="viewport">
    <div id="grid"></div>
</div>

<div id="yt-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', { height: '0', width: '0' });
    }

    // TÄSSÄ ON SANAT JA BIISIT
    const words = [
        { x: 5, y: 5, answer: "DIVER", clue: "Dion pyhä sukeltaja (1983/90-luvun kestohitti)", dir: "h", num: 1, yt: "2lvs2FzF238", start: 45, info: "Dio - Holy Diver" },
        { x: 5, y: 5, answer: "DIMEBAG", clue: "Panteran edesmennyt kitaravelho", dir: "v", num: 1, yt: "RVMvART9cW8", start: 35, info: "Pantera - Walk" },
        { x: 1, y: 8, answer: "TERMINATOR", clue: "Arskan 'I'll be back' jatko-osa (1991)", dir: "h", num: 2, yt: "dpwWYOE1f90", start: 5, info: "Brad Fiedel - T2 Theme" },
        { x: 10, y: 3, answer: "SANDMAN", clue: "Metallican suurin hitti (1991)", dir: "v", num: 3, yt: "CD-E-LDc384", start: 72, info: "Metallica - Enter Sandman" },
        { x: 15, y: 5, answer: "MATRIX", clue: "Punainen vai sininen pilleri? (1999)", dir: "v", num: 4, yt: "m8e-FF8MsqU", start: 30, info: "Propellerheads - Matrix Theme" }
    ];

    const grid = document.getElementById('grid');
    const gridSize = 50; // Tehtiin tilaa 50x50

    function init() {
        grid.style.gridTemplateColumns = `repeat(${gridSize}, 50px)`;
        for(let i=0; i<gridSize*gridSize; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            grid.appendChild(c);
        }

        words.forEach(w => {
            for(let i=0; i<w.answer.length; i++) {
                const idx = (w.dir === 'h') ? (w.y*gridSize + w.x + i) : ((w.y+i)*gridSize + w.x);
                const cell = grid.children[idx];
                cell.classList.add('active');
                if(!cell.querySelector('input')) {
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    cell.appendChild(input);
                    input.addEventListener('focus', () => {
                        document.getElementById('clue-box').innerText = `${w.num}. ${w.clue}`;
                    });
                    input.addEventListener('input', (e) => {
                        if(e.target.value.toUpperCase() === w.answer[i]) {
                            cell.classList.add('correct');
                            checkWord(w);
                        }
                    });
                }
                if(i===0) {
                    const n = document.createElement('div');
                    n.className='num'; n.innerText=w.num;
                    cell.appendChild(n);
                }
            }
        });
    }

    function checkWord(w) {
        let correctCount = 0;
        for(let i=0; i<w.answer.length; i++) {
            const idx = (w.dir === 'h') ? (w.y*gridSize + w.x + i) : ((w.y+i)*gridSize + w.x);
            if(grid.children[idx].classList.contains('correct')) correctCount++;
        }
        
        if(correctCount === w.answer.length) {
            // TUULETUS!
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#f44336', '#ffffff', '#ffd700'] });
            
            if(player && w.yt) {
                player.loadVideoById({ videoId: w.yt, startSeconds: w.start });
                document.getElementById('now-playing').style.display = 'block';
                document.getElementById('track-info').innerText = w.info;
                document.getElementById('yt-link').href = `https://www.youtube.com/watch?v=${w.yt}&t=${w.start}s`;
                // Soitetaan 20 sekuntia ja sammutetaan
                setTimeout(() => player.stopVideo(), 20000);
            }
        }
    }

    // Liikuttelu
    let isDragging = false, px=0, py=0, sx, sy, sc=0.8;
    document.addEventListener('mousedown', e => { 
        if(e.target.tagName !== 'INPUT'){ isDragging=true; sx=e.clientX-px; sy=e.clientY-py; }
    });
    window.addEventListener('mousemove', e => { 
        if(isDragging){ px=e.clientX-sx; py=e.clientY-sy; update(); }
    });
    window.addEventListener('mouseup', () => isDragging=false);
    
    // Zoom rullalla
    window.addEventListener('wheel', e => {
        e.preventDefault();
        sc = Math.min(Math.max(0.1, sc + (e.deltaY * -0.001)), 2);
        update();
    }, { passive: false });

    function update() { grid.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }
    
    init(); update();
</script>
</body>
</html>

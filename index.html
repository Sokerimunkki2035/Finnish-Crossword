<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>90's Mega Crossword</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --clue: #d1d1d1; --accent: #f44336; }
        body { background: #f0f0f0; font-family: 'Arial Narrow', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        
        #header { background: white; padding: 10px 20px; border-radius: 10px; border: 2px solid var(--accent); margin-bottom: 10px; text-align: center; width: 90%; max-width: 600px; }
        
        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 60px); 
            grid-template-rows: repeat(12, 60px);
            background: #000; gap: 1px; border: 3px solid #000;
        }

        .cell { background: white; width: 60px; height: 60px; position: relative; }
        .clue { 
            background: var(--clue); font-size: 10px; font-weight: bold; padding: 2px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; line-height: 1; position: relative;
        }
        .arrow { color: var(--accent); font-size: 18px; position: absolute; bottom: 1px; right: 2px; font-weight: 900; }
        .arrow-d { bottom: 1px; left: 50%; transform: translateX(-50%); right: auto; }

        input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 28px; font-weight: bold; text-transform: uppercase; outline: none;
            background: transparent; cursor: pointer;
        }
        .correct { background: #e8f5e9 !important; }
        .correct input { color: #2e7d32; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold; color: var(--accent);">STRIikki: <span id="s-val">0</span> PÄIVÄÄ 🔥</div>
    <div id="timer">AIKA: 00:00 / 05:00</div>
</div>

<div id="grid">
    <!-- RIVI 1 -->
    <div class="clue">DION<br>PYHÄ<span class="arrow">➔</span></div>
    <div class="cell" data-ans="H"><input maxlength="1"></div>
    <div class="cell" data-ans="O"><input maxlength="1"></div>
    <div class="cell" data-ans="L"><input maxlength="1"></div>
    <div class="cell" data-ans="Y"><input maxlength="1"></div>
    <div class="clue">PULP<br>...<span class="arrow arrow-d">⬇</span></div>
    <div class="clue">METALLICA<br>ALBUMI<span class="arrow arrow-d">⬇</span></div>
    <div class="cell" data-ans="B"><input maxlength="1"></div>
    <div class="cell"></div><div class="cell"></div>

    <!-- RIVI 2 -->
    <div class="clue">KOTI<span class="arrow">➔</span></div>
    <div class="cell" data-ans="K"><input maxlength="1"></div>
    <div class="cell" data-ans="O"><input maxlength="1"></div>
    <div class="cell" data-ans="T"><input maxlength="1"></div>
    <div class="cell" data-ans="I"><input maxlength="1"></div>
    <div class="cell" data-ans="F"><input maxlength="1"></div>
    <div class="cell" data-ans="M"><input maxlength="1"></div>
    <div class="cell" data-ans="L"><input maxlength="1"></div>
    <div class="cell"></div><div class="cell"></div>

    <!-- RIVI 3 -->
    <div class="clue">PITTIN<br>TRIL.<span class="arrow">➔</span></div>
    <div class="cell" data-ans="S"><input maxlength="1"></div>
    <div class="cell" data-ans="E"><input maxlength="1"></div>
    <div class="cell" data-ans="V"><input maxlength="1"></div>
    <div class="cell" data-ans="E"><input maxlength="1"></div>
    <div class="cell" data-ans="N"><input maxlength="1"></div>
    <div class="cell" data-ans="I"><input maxlength="1"></div>
    <div class="cell" data-ans="A"><input maxlength="1"></div>
    <div class="cell"></div><div class="cell"></div>

    <!-- RIVI 4 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="clue">GRUNGE<span class="arrow arrow-d">⬇</span></div>
    <div class="cell" data-ans="I"><input maxlength="1"></div>
    <div class="cell" data-ans="C"><input maxlength="1"></div>
    <div class="cell" data-ans="C"><input maxlength="1"></div>
    <div class="cell"></div><div class="cell"></div>

    <!-- RIVI 5 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell" data-ans="N"><input maxlength="1"></div>
    <div class="cell" data-ans="C"><input maxlength="1"></div>
    <div class="cell" data-ans="K"><input maxlength="1"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>

<script>
    const inputs = document.querySelectorAll('input');
    
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            const cell = input.parentElement;
            const correctAns = cell.dataset.ans;

            if (val === correctAns) {
                cell.classList.add('correct');
                // AUTOMAATTINEN HYPPÄYS: Etsi seuraava tyhjä input
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkWin();
            }
        });

        // Backspace siirtää taaksepäin
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    function checkWin() {
        const allCorrect = Array.from(inputs).every(i => i.value.toUpperCase() === i.parentElement.dataset.ans);
        if (allCorrect) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    // Ajastin
    let sec = 0;
    setInterval(() => {
        sec++;
        const m = Math.floor(sec/60).toString().padStart(2,'0');
        const s = (sec%60).toString().padStart(2,'0');
        document.getElementById('timer').innerText = `AIKA: ${m}:${s} / 05:00`;
    }, 1000);
</script>
</body>
</html>

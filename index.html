<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Aito Sanaristikko</title>
    <style>
        body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(8, 80px); 
            grid-template-rows: repeat(8, 80px);
            background: #000; gap: 1px; border: 2px solid #000;
        }
        .cell { background: white; position: relative; width: 80px; height: 80px; }
        
        /* Vihjeruutu (Harmaa pohja, pieni teksti) */
        .clue-cell { background: #d1d1d1; font-size: 11px; padding: 4px; line-height: 1.1; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }
        .clue-cell::after { content: '➔'; position: absolute; bottom: 2px; right: 2px; color: #444; font-size: 14px; }

        /* Vastausruutu (Valkoinen, iso kirjain) */
        .cell input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 32px; font-weight: bold; text-transform: uppercase; outline: none;
        }
        .cell input:focus { background: #fff9c4; }
    </style>
</head>
<body>

<div id="grid">
    <div class="cell clue-cell">DION<br>HITTI</div>
    <div class="cell"><input maxlength="1" data-ans="H"></div>
    <div class="cell"><input maxlength="1" data-ans="O"></div>
    <div class="cell"><input maxlength="1" data-ans="L"></div>
    <div class="cell"><input maxlength="1" data-ans="Y"></div>
    <div class="cell clue-cell" style="background:#000"></div> <div class="cell clue-cell">MUSTA<br>ALBUMI</div>
    <div class="cell"><input maxlength="1" data-ans="M"></div>

    <div class="cell clue-cell">ASUTUS</div>
    <div class="cell"><input maxlength="1" data-ans="K"></div>
    <div class="cell"><input maxlength="1" data-ans="O"></div>
    <div class="cell"><input maxlength="1" data-ans="T"></div>
    <div class="cell"><input maxlength="1" data-ans="I"></div>
    <div class="cell clue-cell">METALLI<br>BÄNDI</div>
    <div class="cell"><input maxlength="1" data-ans="D"></div>
    <div class="cell"><input maxlength="1" data-ans="E"></div>
</div>

</body>
</html>
